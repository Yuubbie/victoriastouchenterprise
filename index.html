<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Victoria's Touch Enterprise</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700&family=Didact+Gothic&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black:#080808; --dark:#0f0f0f; --gold:#BF9B30; --gold2:#D4AF50;
  --grey:#7A7570; --light:#E8E2D8; --border:rgba(191,155,48,0.18);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Inter',sans-serif; background:var(--black); color:var(--light);
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:20px;
}
.login-box{
  background:var(--dark); border:1px solid var(--border);
  padding:48px 40px; width:100%; max-width:400px;
}
.logo{ text-align:center; margin-bottom:36px; }
.logo h1{ font-family:'Bodoni Moda',serif; font-size:1.6rem; color:var(--white); font-weight:400; font-style:italic; color:#fff; }
.logo p{ font-family:'Didact Gothic',sans-serif; font-size:0.62rem; letter-spacing:3px; text-transform:uppercase; color:var(--gold); margin-top:6px; }
.fg{ margin-bottom:20px; }
.fg label{ display:block; font-family:'Didact Gothic',sans-serif; font-size:0.6rem; letter-spacing:2.5px; text-transform:uppercase; color:var(--gold); margin-bottom:8px; }
.fg input{
  width:100%; padding:13px 16px; background:rgba(255,255,255,0.03);
  border:1px solid var(--border); color:var(--light); font-size:0.9rem;
  outline:none; font-family:'Inter',sans-serif; transition:border-color 0.2s;
}
.fg input:focus{ border-color:var(--gold); }
.btn{
  width:100%; padding:14px; background:var(--gold); color:var(--black);
  border:none; font-family:'Didact Gothic',sans-serif; font-size:0.68rem;
  letter-spacing:3px; text-transform:uppercase; cursor:pointer; font-weight:700;
  transition:background 0.2s;
}
.btn:hover{ background:var(--gold2); }
.btn:disabled{ opacity:0.5; cursor:not-allowed; }
.error-msg{
  background:rgba(220,53,69,0.1); border:1px solid rgba(220,53,69,0.3);
  color:#ff8a93; padding:12px 16px; font-size:0.82rem; margin-bottom:20px; display:none;
}
.error-msg.show{ display:block; }
.back-link{ text-align:center; margin-top:24px; }
.back-link a{ color:var(--grey); font-size:0.78rem; text-decoration:none; }
.back-link a:hover{ color:var(--gold); }
</style>
</head>
<body>

<div class="login-box">
  <div class="logo">
    <h1 style="color:#fff;">Victoria's Touch</h1>
    <p>Admin Panel</p>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <form id="loginForm">
    <div class="fg">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="victoriatoucheventsandbridals@gmail.com" required>
    </div>
    <div class="fg">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" required>
    </div>
    <button type="submit" class="btn" id="loginBtn">Sign In</button>
  </form>

  <div class="back-link">
    <a href="../index.html">&larr; Back to website</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script>
// Redirect if already logged in
(async () => {
  const { data } = await supabaseClient.auth.getSession();
  if (data.session) window.location.href = 'dashboard.html';
})();

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');
  errorMsg.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'Signing in...';

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

  if (error) {
    errorMsg.textContent = 'Incorrect email or password. Please try again.';
    errorMsg.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Sign In';
    return;
  }

  window.location.href = 'dashboard.html';
});
</script>
</body>
</html>
