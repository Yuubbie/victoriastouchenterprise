<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Victoria's Touch Enterprise Admin</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;1,6..96,400&family=Didact+Gothic&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --black:#080808; --dark:#0f0f0f; --dark2:#161512; --gold:#BF9B30; --gold2:#D4AF50;
  --grey:#7A7570; --light:#E8E2D8; --white:#fff; --border:rgba(191,155,48,0.18); --border2:rgba(255,255,255,0.07);
  --green:#2ECC71; --red:#E74C3C;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{ font-family:'Inter',sans-serif; background:var(--black); color:var(--light); min-height:100vh; }
::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-thumb{background:var(--gold);}

/* TOPBAR */
.topbar{
  position:sticky; top:0; z-index:50;
  background:rgba(8,8,8,0.97); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px; height:64px;
}
.topbar-logo{ font-family:'Bodoni Moda',serif; font-style:italic; font-size:1.1rem; color:var(--white); }
.topbar-logo span{ color:var(--gold); }
.topbar-right{ display:flex; align-items:center; gap:16px; }
.topbar-user{ font-size:0.78rem; color:var(--grey); }
.logout-btn{
  background:none; border:1px solid var(--border2); color:var(--grey);
  padding:8px 16px; font-size:0.72rem; letter-spacing:1px; text-transform:uppercase;
  cursor:pointer; font-family:'Didact Gothic',sans-serif; transition:all 0.2s;
}
.logout-btn:hover{ border-color:var(--red); color:var(--red); }

/* LAYOUT */
.layout{ display:flex; min-height:calc(100vh - 64px); }
.sidebar{
  width:220px; background:var(--dark); border-right:1px solid var(--border2);
  padding:24px 0; flex-shrink:0;
}
.nav-item{
  display:flex; align-items:center; gap:12px; padding:13px 24px;
  color:var(--grey); font-size:0.85rem; cursor:pointer; transition:all 0.2s;
  border-left:2px solid transparent;
}
.nav-item:hover{ background:rgba(191,155,48,0.05); color:var(--light); }
.nav-item.active{ background:rgba(191,155,48,0.08); color:var(--gold); border-left-color:var(--gold); }
.main{ flex:1; padding:32px 36px; max-width:1100px; }

/* PAGE HEADER */
.page-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; flex-wrap:wrap; gap:14px; }
.page-header h2{ font-family:'Bodoni Moda',serif; font-size:1.8rem; font-weight:400; color:var(--white); font-style:italic; }
.add-btn{
  background:var(--gold); color:var(--black); border:none;
  padding:10px 22px; font-family:'Didact Gothic',sans-serif; font-size:0.7rem;
  letter-spacing:2px; text-transform:uppercase; cursor:pointer; font-weight:700;
  transition:background 0.2s;
}
.add-btn:hover{ background:var(--gold2); }

/* CARDS LIST */
.item-card{
  background:var(--dark); border:1px solid var(--border2);
  padding:18px 20px; margin-bottom:10px; display:flex; align-items:center; gap:16px;
}
.item-thumb{ width:56px; height:56px; object-fit:cover; flex-shrink:0; background:var(--dark2); }
.item-info{ flex:1; min-width:0; }
.item-info h4{ font-size:0.92rem; color:var(--white); margin-bottom:3px; }
.item-info p{ font-size:0.78rem; color:var(--grey); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:500px; }
.item-actions{ display:flex; gap:8px; flex-shrink:0; }
.icon-btn{
  width:34px; height:34px; border:1px solid var(--border2); background:none;
  color:var(--grey); cursor:pointer; font-size:0.85rem; transition:all 0.2s;
  display:flex; align-items:center; justify-content:center;
}
.icon-btn:hover{ border-color:var(--gold); color:var(--gold); }
.icon-btn.del:hover{ border-color:var(--red); color:var(--red); }
.empty-state{ text-align:center; padding:60px 20px; color:var(--grey); font-size:0.88rem; }

/* MODAL */
.modal-overlay{
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7);
  z-index:200; align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.show{ display:flex; }
.modal{
  background:var(--dark); border:1px solid var(--border); padding:32px;
  width:100%; max-width:480px; max-height:88vh; overflow-y:auto;
}
.modal h3{ font-family:'Bodoni Moda',serif; font-size:1.3rem; color:var(--white); font-style:italic; margin-bottom:22px; }
.fg{ margin-bottom:16px; }
.fg label{ display:block; font-family:'Didact Gothic',sans-serif; font-size:0.6rem; letter-spacing:2px; text-transform:uppercase; color:var(--gold); margin-bottom:7px; }
.fg input, .fg textarea, .fg select{
  width:100%; padding:11px 14px; background:rgba(255,255,255,0.03);
  border:1px solid var(--border2); color:var(--light); font-size:0.85rem;
  outline:none; font-family:'Inter',sans-serif; transition:border-color 0.2s;
}
.fg input:focus, .fg textarea:focus, .fg select:focus{ border-color:var(--gold); }
.fg textarea{ resize:vertical; min-height:80px; }
.fg select option{ background:var(--dark); }
.fg-row{ display:flex; gap:12px; }
.fg-row .fg{ flex:1; }
.modal-actions{ display:flex; gap:10px; margin-top:24px; }
.modal-actions button{ flex:1; padding:12px; font-family:'Didact Gothic',sans-serif; font-size:0.68rem; letter-spacing:2px; text-transform:uppercase; cursor:pointer; border:none; font-weight:700; }
.btn-save{ background:var(--gold); color:var(--black); }
.btn-save:hover{ background:var(--gold2); }
.btn-cancel{ background:none; border:1px solid var(--border2) !important; color:var(--grey); }
.btn-cancel:hover{ border-color:var(--grey) !important; }
.file-drop{
  border:1px dashed var(--border); padding:24px; text-align:center; cursor:pointer;
  font-size:0.8rem; color:var(--grey); transition:all 0.2s; margin-bottom:10px;
}
.file-drop:hover{ border-color:var(--gold); color:var(--gold); }
.preview-img{ max-width:100%; max-height:140px; margin-top:10px; display:none; }

/* TOAST */
.toast{
  position:fixed; bottom:24px; right:24px; background:var(--dark);
  border:1px solid var(--gold); padding:14px 22px; font-size:0.85rem;
  color:var(--white); z-index:300; display:none; max-width:320px;
}
.toast.show{ display:block; animation:slideUp 0.3s ease; }
.toast.error{ border-color:var(--red); }
@keyframes slideUp{ from{transform:translateY(20px);opacity:0;} to{transform:translateY(0);opacity:1;} }

/* MOBILE */
@media(max-width:768px){
  .layout{ flex-direction:column; }
  .sidebar{ width:100%; display:flex; overflow-x:auto; padding:12px; gap:4px; border-right:none; border-bottom:1px solid var(--border2); }
  .nav-item{ border-left:none; border-bottom:2px solid transparent; white-space:nowrap; padding:10px 16px; }
  .nav-item.active{ border-bottom-color:var(--gold); }
  .main{ padding:20px 16px; }
  .item-card{ flex-wrap:wrap; }
  .item-info p{ max-width:200px; }
  .fg-row{ flex-direction:column; gap:0; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Victoria's Touch <span>Admin</span></div>
  <div class="topbar-right">
    <span class="topbar-user" id="userEmail"></span>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="nav-item active" data-tab="gallery" onclick="switchTab('gallery',this)">&#128247; Gallery</div>
    <div class="nav-item" data-tab="services" onclick="switchTab('services',this)">&#9881; Services</div>
    <div class="nav-item" data-tab="packages" onclick="switchTab('packages',this)">&#128176; Packages</div>
    <div class="nav-item" data-tab="testimonials" onclick="switchTab('testimonials',this)">&#11088; Testimonials</div>
  </div>

  <div class="main">
    <!-- GALLERY TAB -->
    <div class="tab-page" id="page-gallery">
      <div class="page-header">
        <h2>Gallery Photos</h2>
        <button class="add-btn" onclick="openModal('gallery')">+ Add Photo</button>
      </div>
      <div id="gallery-list"></div>
    </div>

    <!-- SERVICES TAB -->
    <div class="tab-page" id="page-services" style="display:none">
      <div class="page-header">
        <h2>Services</h2>
        <button class="add-btn" onclick="openModal('services')">+ Add Service</button>
      </div>
      <div id="services-list"></div>
    </div>

    <!-- PACKAGES TAB -->
    <div class="tab-page" id="page-packages" style="display:none">
      <div class="page-header">
        <h2>Wedding Packages</h2>
        <button class="add-btn" onclick="openModal('packages')">+ Add Package</button>
      </div>
      <div id="packages-list"></div>
    </div>

    <!-- TESTIMONIALS TAB -->
    <div class="tab-page" id="page-testimonials" style="display:none">
      <div class="page-header">
        <h2>Testimonials</h2>
        <button class="add-btn" onclick="openModal('testimonials')">+ Add Testimonial</button>
      </div>
      <div id="testimonials-list"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Add Item</h3>
    <form id="modalForm"></form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script>
let currentTab = 'gallery';
let editingId = null;

// Auth check
(async () => {
  const { data } = await supabaseClient.auth.getSession();
  if (!data.session) { window.location.href = 'index.html'; return; }
  document.getElementById('userEmail').textContent = data.session.user.email;
  loadTab('gallery');
})();

async function logout() {
  await supabaseClient.auth.signOut();
  window.location.href = 'index.html';
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.tab-page').forEach(p => p.style.display = 'none');
  document.getElementById('page-' + tab).style.display = 'block';
  loadTab(tab);
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function loadTab(tab) {
  const list = document.getElementById(tab + '-list');
  list.innerHTML = '<div class="empty-state">Loading...</div>';
  const { data, error } = await supabaseClient.from(tab).select('*').order('display_order', {ascending:true});
  if (error) { list.innerHTML = '<div class="empty-state">Error loading data</div>'; showToast(error.message, true); return; }
  if (!data || data.length === 0) { list.innerHTML = '<div class="empty-state">No items yet. Click "Add" to create your first one.</div>'; return; }

  list.innerHTML = data.map(item => renderCard(tab, item)).join('');
}

function renderCard(tab, item) {
  let thumb = '', title = '', sub = '';
  if (tab === 'gallery') {
    thumb = `<img class="item-thumb" src="${item.image_url}" alt="">`;
    title = item.caption || 'Untitled photo';
    sub = item.image_url;
  } else if (tab === 'services') {
    thumb = `<div class="item-thumb" style="display:flex;align-items:center;justify-content:center;font-size:1.5rem;">${item.category === 'events' ? '&#127881;' : '&#127909;'}</div>`;
    title = item.title;
    sub = item.description;
  } else if (tab === 'packages') {
    thumb = `<div class="item-thumb" style="display:flex;align-items:center;justify-content:center;font-size:1.5rem;">&#128176;</div>`;
    title = item.name + (item.is_featured ? ' &#11088;' : '');
    sub = item.price_range + ' &middot; ' + item.guest_range;
  } else if (tab === 'testimonials') {
    thumb = `<div class="item-thumb" style="display:flex;align-items:center;justify-content:center;font-size:1.5rem;">&#128100;</div>`;
    title = item.client_name;
    sub = item.review;
  }
  return `
    <div class="item-card">
      ${thumb}
      <div class="item-info"><h4>${title}</h4><p>${sub}</p></div>
      <div class="item-actions">
        <button class="icon-btn" onclick='editItem("${tab}", ${JSON.stringify(item).replace(/'/g,"&#39;")})'>&#9998;</button>
        <button class="icon-btn del" onclick="deleteItem('${tab}','${item.id}')">&#128465;</button>
      </div>
    </div>`;
}

async function deleteItem(tab, id) {
  if (!confirm('Delete this item permanently?')) return;
  const { error } = await supabaseClient.from(tab).delete().eq('id', id);
  if (error) { showToast(error.message, true); return; }
  showToast('Deleted successfully');
  loadTab(tab);
}

function openModal(tab, item = null) {
  editingId = item ? item.id : null;
  document.getElementById('modalTitle').textContent = (item ? 'Edit ' : 'Add ') + tab.charAt(0).toUpperCase() + tab.slice(1).slice(0,-1);
  document.getElementById('modalOverlay').classList.add('show');
  const form = document.getElementById('modalForm');

  if (tab === 'gallery') {
    form.innerHTML = `
      <div class="fg"><label>Photo URL</label><input type="url" id="f_image_url" placeholder="https://..." value="${item?.image_url || ''}" required></div>
      <div class="fg"><label>Caption</label><input type="text" id="f_caption" placeholder="e.g. Wedding decor setup" value="${item?.caption || ''}"></div>
      <div class="fg"><label>Display Order</label><input type="number" id="f_display_order" value="${item?.display_order || 0}"></div>
      <p style="font-size:0.72rem;color:var(--grey);margin-top:-8px;">Tip: Upload your photo to a free image host like imgbb.com or postimages.org, then paste the direct image link here.</p>
      <div class="modal-actions"><button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button><button type="submit" class="btn-save">Save</button></div>
    `;
  } else if (tab === 'services') {
    form.innerHTML = `
      <div class="fg"><label>Category</label><select id="f_category"><option value="events" ${item?.category==='events'?'selected':''}>Events</option><option value="visuals" ${item?.category==='visuals'?'selected':''}>VT Visuals</option></select></div>
      <div class="fg"><label>Title</label><input type="text" id="f_title" value="${item?.title || ''}" required></div>
      <div class="fg"><label>Description</label><textarea id="f_description" required>${item?.description || ''}</textarea></div>
      <div class="fg"><label>Display Order</label><input type="number" id="f_display_order" value="${item?.display_order || 0}"></div>
      <div class="modal-actions"><button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button><button type="submit" class="btn-save">Save</button></div>
    `;
  } else if (tab === 'packages') {
    form.innerHTML = `
      <div class="fg"><label>Package Name</label><input type="text" id="f_name" value="${item?.name || ''}" required></div>
      <div class="fg"><label>Tier Label</label><input type="text" id="f_tier" placeholder="e.g. Classic Package" value="${item?.tier || ''}"></div>
      <div class="fg-row">
        <div class="fg"><label>Price Range</label><input type="text" id="f_price_range" placeholder="&#8358;5M to &#8358;9M" value="${item?.price_range || ''}" required></div>
        <div class="fg"><label>Guest Range</label><input type="text" id="f_guest_range" placeholder="100 to 250" value="${item?.guest_range || ''}" required></div>
      </div>
      <div class="fg"><label>Features (one per line)</label><textarea id="f_features" style="min-height:120px;" required>${item?.features ? item.features.join('\\n') : ''}</textarea></div>
      <div class="fg"><label><input type="checkbox" id="f_is_featured" ${item?.is_featured ? 'checked' : ''} style="width:auto;margin-right:8px;">Mark as "Most Popular"</label></div>
      <div class="modal-actions"><button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button><button type="submit" class="btn-save">Save</button></div>
    `;
  } else if (tab === 'testimonials') {
    form.innerHTML = `
      <div class="fg"><label>Client Name</label><input type="text" id="f_client_name" value="${item?.client_name || ''}" required></div>
      <div class="fg"><label>Review</label><textarea id="f_review" required>${item?.review || ''}</textarea></div>
      <div class="fg"><label>Rating (1-5)</label><input type="number" id="f_rating" min="1" max="5" value="${item?.rating || 5}"></div>
      <div class="modal-actions"><button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button><button type="submit" class="btn-save">Save</button></div>
    `;
  }

  form.onsubmit = (e) => { e.preventDefault(); saveItem(tab); };
}

function editItem(tab, item) {
  openModal(tab, item);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  editingId = null;
}

async function saveItem(tab) {
  let payload = {};
  if (tab === 'gallery') {
    payload = {
      image_url: document.getElementById('f_image_url').value,
      caption: document.getElementById('f_caption').value,
      display_order: parseInt(document.getElementById('f_display_order').value) || 0
    };
  } else if (tab === 'services') {
    payload = {
      category: document.getElementById('f_category').value,
      title: document.getElementById('f_title').value,
      description: document.getElementById('f_description').value,
      display_order: parseInt(document.getElementById('f_display_order').value) || 0
    };
  } else if (tab === 'packages') {
    payload = {
      name: document.getElementById('f_name').value,
      tier: document.getElementById('f_tier').value,
      price_range: document.getElementById('f_price_range').value,
      guest_range: document.getElementById('f_guest_range').value,
      features: document.getElementById('f_features').value.split('\n').map(s=>s.trim()).filter(Boolean),
      is_featured: document.getElementById('f_is_featured').checked
    };
  } else if (tab === 'testimonials') {
    payload = {
      client_name: document.getElementById('f_client_name').value,
      review: document.getElementById('f_review').value,
      rating: parseInt(document.getElementById('f_rating').value) || 5
    };
  }

  let error;
  if (editingId) {
    ({ error } = await supabaseClient.from(tab).update(payload).eq('id', editingId));
  } else {
    ({ error } = await supabaseClient.from(tab).insert([payload]));
  }

  if (error) { showToast(error.message, true); return; }
  showToast('Saved successfully');
  closeModal();
  loadTab(tab);
}
</script>
</body>
</html>
